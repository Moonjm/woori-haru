# https://docs.coderabbit.ai/reference/yaml-template
language: ko-KR
reviews:
  profile: chill
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  auto_review:
    enabled: true
    drafts: false
  path_filters:
    - "!**/*.pbxproj"
    - "!**/*.xcworkspacedata"
    - "!**/*.xcscheme"
  path_instructions:
    - path: "**/*.swift"
      instructions: "SwiftUI/iOS 관례 준수 여부 확인. 메인스레드 UI 갱신, 옵셔널 강제 언랩, retain cycle(클로저 캡처), 비동기 상태 관리 위주로 점검."
chat:
  auto_reply: true
